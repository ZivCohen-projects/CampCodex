services:
  - type: web
    name: camp-codex-conversation-coach
    env: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: AI_PROVIDER_ORDER
        value: gemini,groq
      - key: GEMINI_API_KEYS
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GROQ_API_KEYS
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: USE_AI_ADAPTIVE_QUESTIONS
        value: false
      - key: ALLOWED_ORIGIN
        value: https://zivcohen-projects.github.io
