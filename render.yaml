services:
  - type: web
    name: camp-codex-conversation-coach
    env: node
    plan: free
    buildCommand: ""
    startCommand: node server.js
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: ALLOWED_ORIGIN
        value: https://zivcohen-projects.github.io
